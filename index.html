<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="US Market">
<title>🇺🇸 US Market Morning Briefing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: #e8ecf1;
    color: #0f172a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  .wrap {
    max-width: 800px;
    width: 100%;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px 48px 36px;
    display: flex;
    flex-direction: column;
  }
  .header {
    text-align: center;
    padding-bottom: 24px;
    margin-bottom: 28px;
    border-bottom: 3px solid #0f172a;
  }
  .header h1 { font-size: 28px; font-weight: 900; color: #0f172a; letter-spacing: -0.5px; }
  .header p { font-size: 13px; color: #7a8a9e; margin-top: 8px; }
  #briefing-list { flex: 1; }
  .item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f6f8fa;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .item:hover { background: #f8fafc; border-color: #2563eb; box-shadow: 0 2px 8px rgba(37,99,235,0.08); }
  .item.new { border-left: 3px solid #dc2626; }
  .item-date { font-size: 15px; font-weight: 700; color: #0f172a; }
  .item-sub { font-size: 11px; color: #7a8a9e; margin-top: 3px; line-height: 1.5; }
  .badge-new {
    background: #dc2626;
    color: #fff;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .badge-link {
    color: #2563eb;
    font-size: 12px;
    font-weight: 700;
  }
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 10px;
    color: #94a3b8;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <h1>🇺🇸 US Market Morning Briefing</h1>
  <p>매일 아침 7시 — 전일 미국 시장 마감 요약 브리핑 (IB 스타일 3페이지 A4)</p>
</div>

<div id="briefing-list"></div>

<div class="footer">
  ⚠️ 자동 생성 브리핑 — 투자 권유가 아닙니다 &nbsp;|&nbsp; Data: Yahoo Finance (yfinance)
</div>

</div>

<script>
const b = [
  { d: "2026-04-10", label: "2026년 4월 10일 (금)", sub: "4/9 마감 — S&P500 +0.62% 5일 연속↑·DOW +0.58%(48,186·48K 돌파)·NDX +0.83%·SOX +2.10% · AMZN +5.60%·MU +3.63%·INTC +4.70% · VIX 19.49 · CPI 대기", n: true },
  { d: "2026-04-09", label: "2026년 4월 9일 (목)", sub: "4/8 마감 — 미·이란 2주 휴전 합의 · DOW +2.85%(+1,325p·2025.4 이래 최대)·SPX +2.51%·NDX +2.80%·SOX +6.34% · ASML +8.77%·MU +7.72%·META +6.50% · WTI -14.14% $96.98" },
  { d: "2026-04-08", label: "2026년 4월 8일 (수)", sub: "4/7 마감 — S&P500 +0.08% 5일 연속↑(가까스로) · Pakistan 2주 연장 제안 · AVGO +6.21% Anthropic 메가딜 · AAPL -2.07% 폴더블 결함 · VIX 25.78" },
  { d: "2026-04-07", label: "2026년 4월 7일 (화)", sub: "4/6 마감 — S&P500 +0.44% 4일 연속↑ · 이란 휴전 협상 기대 · SOX +1.06% MU +3.15% · TSLA -2.15% · WTI $112.61" },
  { d: "2026-04-06", label: "2026년 4월 6일 (월)", sub: "4/2 마감+Good Friday — NFP 178K 서프라이즈(3배) · 10Y 4.35% · S&P500 +0.11% / WTI $112 이란전 · 100% 제약관세" },
  { d: "2026-04-03", label: "2026년 4월 3일 (금)", sub: "4/2 마감 — S&P500 +0.11% / NASDAQ +0.18% / WTI +11.9%($112) 이란 확전 우려 · TSLA -5.42% Q1 배송 미스 · INTC +4.89%" },
  { d: "2026-04-02", label: "2026년 4월 2일 (목)", sub: "4/1 마감 — S&P500 +0.72% / NASDAQ +1.16% / MU +8.88% Intel $14.2B Fab · 금 $4,785 사상최고" },
  { d: "2026-04-01", label: "2026년 4월 1일 (수)", sub: "3/31 마감 — S&P500 +2.91% / NASDAQ +3.83% / 이란 종전 기대 + NVDA $2B Marvell 투자" },
];

const list = document.getElementById('briefing-list');
b.forEach(item => {
  const a = document.createElement('a');
  a.className = 'item' + (item.n ? ' new' : '');
  a.href = `briefings/us-market-briefing-${item.d}.html`;
  a.innerHTML = `
    <div>
      <div class="item-date">${item.label}</div>
      <div class="item-sub">${item.sub}</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      ${item.n ? '<span class="badge-new">NEW</span>' : ''}
      <span class="badge-link">브리핑 보기 →</span>
    </div>
  `;
  list.appendChild(a);
});
</script>
</body>
</html>
